name: update preview formula

on:
  repository_dispatch:
    types:
      - ho_azure_preview
  workflow_dispatch:
    inputs:
      version:
        description: Preview version, for example main-abcdef1
        required: true
        type: string
      source_url:
        description: Source tarball URL
        required: true
        type: string
      sha256:
        description: SHA256 for the source tarball
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_URL: ${{ github.event.client_payload.source_url }}
          DISPATCH_SHA256: ${{ github.event.client_payload.sha256 }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_URL: ${{ inputs.source_url }}
          INPUT_SHA256: ${{ inputs.sha256 }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            version="$DISPATCH_VERSION"
            source_url="$DISPATCH_URL"
            sha256="$DISPATCH_SHA256"
          else
            version="$INPUT_VERSION"
            source_url="$INPUT_URL"
            sha256="$INPUT_SHA256"
          fi

          if [ -z "$version" ] || [ -z "$source_url" ] || [ -z "$sha256" ]; then
            echo "missing release metadata" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "source_url=$source_url"
            echo "sha256=$sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve source layout
        id: layout
        env:
          SOURCE_URL: ${{ steps.meta.outputs.source_url }}
        run: |
          set -euo pipefail
          source_archive="$RUNNER_TEMP/ho-azure-source.tar.gz"
          curl -L --fail "$SOURCE_URL" -o "$source_archive"

          if tar -tzf "$source_archive" | grep -q '/cmd/ho-azure/'; then
            build_path="./cmd/ho-azure"
          elif tar -tzf "$source_archive" | grep -q '/cmd/azurefox/'; then
            build_path="./cmd/azurefox"
          else
            echo "source archive does not contain a known HO-Azure command entrypoint" >&2
            exit 1
          fi

          echo "build_path=$build_path" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          python3 scripts/update_formula.py \
            --formula Formula/ho-azure-preview.rb \
            --version "${{ steps.meta.outputs.version }}" \
            --url "${{ steps.meta.outputs.source_url }}" \
            --sha256 "${{ steps.meta.outputs.sha256 }}" \
            --build-path "${{ steps.layout.outputs.build_path }}"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_PR_TOKEN != '' && secrets.HOMEBREW_TAP_PR_TOKEN || secrets.HOME_TAP_PR_TOKEN != '' && secrets.HOME_TAP_PR_TOKEN || github.token }}
          branch: automation/update-ho-azure-preview-${{ steps.meta.outputs.version }}
          commit-message: "brew: update ho-azure-preview to ${{ steps.meta.outputs.version }}"
          title: "brew: update ho-azure-preview to ${{ steps.meta.outputs.version }}"
          body: |
            Updates preview `ho-azure-preview` to `${{ steps.meta.outputs.version }}`.

            - source: `${{ steps.meta.outputs.source_url }}`
            - sha256: `${{ steps.meta.outputs.sha256 }}`
            - build path: `${{ steps.layout.outputs.build_path }}`
          delete-branch: true

      - name: Enable auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_TOKEN != '' && secrets.HOMEBREW_TAP_PR_TOKEN || secrets.HOME_TAP_PR_TOKEN != '' && secrets.HOME_TAP_PR_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash
