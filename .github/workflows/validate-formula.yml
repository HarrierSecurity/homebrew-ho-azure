name: validate formula

on:
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/*.yml"
      - "README.md"
      - "scripts/update_formula.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage local tap
        run: |
          set -euo pipefail
          tap_root="$(brew --repository)/Library/Taps/harriersecurity"
          tap_path="${tap_root}/homebrew-ho-azure"
          mkdir -p "$tap_root"
          rm -rf "$tap_path"
          cp -R "$GITHUB_WORKSPACE" "$tap_path"

      - name: Audit formula
        run: |
          brew audit --strict harriersecurity/ho-azure/ho-azure
          brew audit --strict harriersecurity/ho-azure/ho-azure-preview

      - name: Core-readiness audit
        run: brew audit --new --formula harriersecurity/ho-azure/ho-azure

      - name: Install stable from source
        run: brew install --build-from-source harriersecurity/ho-azure/ho-azure

      - name: Test stable formula
        run: brew test harriersecurity/ho-azure/ho-azure

      - name: Uninstall stable formula before preview
        run: brew uninstall harriersecurity/ho-azure/ho-azure

      - name: Install preview from source
        run: brew install --build-from-source harriersecurity/ho-azure/ho-azure-preview

      - name: Test preview formula
        run: brew test harriersecurity/ho-azure/ho-azure-preview
